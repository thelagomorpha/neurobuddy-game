sonar.projectKey=thelagomorpha_neurobuddy-game
sonar.organization=thelagomorpha

# Source directories
sonar.sources=Assets/Scripts/
sonar.tests=Assets/Tests/
sonar.sourceEncoding=UTF-8

# Exclude non-code directories and generated reports
sonar.exclusions=**/*.meta,**/*.asset,**/*.prefab,**/*.unity,**/*.mat,**/*.shader,CodeCoverage/**,Library/**,Temp/**,Logs/**,UserSettings/**,ProjectSettings/**

# Test exclusions
sonar.test.exclusions=**/*.meta

# Coverage exclusions (don't measure coverage on test files)
sonar.coverage.exclusions=Assets/Tests/**

# Duplication exclusions
sonar.cpd.exclusions=Assets/Tests/**

# Test coverage (auto-populated by CI)
sonar.cs.opencover.reportsPaths=**/TestCoverageResults_*.xml
