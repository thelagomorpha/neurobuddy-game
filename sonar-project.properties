sonar.projectKey=thelagomorpha_neurobuddy-game
sonar.organization=thelagomorpha

# Source directories
sonar.sources=Assets/Scripts/
sonar.tests=Assets/Tests/
sonar.sourceEncoding=UTF-8

# Exclude non-code directories
sonar.exclusions=**/*.meta,**/*.asset,**/*.prefab,**/*.unity,**/*.mat,**/*.shader

# Test coverage (auto-populated by CI)
sonar.cs.opencover.reportsPaths=**/TestCoverageResults_*.xml
