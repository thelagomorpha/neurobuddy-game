sonar.projectKey=thelagomorpha_neurobuddy-game
sonar.organization=thelagomorpha

# Source directories
sonar.sources=Assets/
sonar.sourceEncoding=UTF-8

# Exclude non-code directories
sonar.exclusions=**/Library/**,**/Temp/**,**/Logs/**,**/obj/**,**/Packages/**,**/UserSettings/**,**/ProjectSettings/**,**/*.meta,**/*.asset,**/*.prefab,**/*.unity,**/*.mat,**/*.shader

# Test coverage (auto-populated by CI)
sonar.cs.opencover.reportsPaths=CodeCoverage/**/*-opencoverage.xml
