name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  sonarqube:
    name: Build and Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-SonarQube
          restore-keys: Library-

      # Free disk space for large Unity Docker image
      - uses: jlumbroso/free-disk-space@v1.3.1

      # Setup .NET SDK (required for dotnet-sonarscanner)
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Setup Java (required by SonarScanner analysis engine)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install SonarScanner for .NET
        run: dotnet tool install --global dotnet-sonarscanner

      # BEGIN: Start SonarQube analysis (before build/test)
      - name: SonarScanner Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"thelagomorpha_neurobuddy-game" \
            /o:"thelagomorpha" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="**/TestCoverageResults_*.xml" \
            /d:sonar.exclusions="**/*.meta,**/*.asset,**/*.prefab,**/*.unity,**/*.mat,**/*.shader"

      # Run Unity tests with coverage
      - uses: game-ci/unity-test-runner@v4
        id: unity-test
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;generateOpenCoverReport;assemblyFilters:+GameScripts'

      # Fix coverage file permissions (generated as root inside Docker)
      - name: Fix coverage permissions
        if: always()
        run: |
          sudo chmod -R a+r ${{ steps.unity-test.outputs.coveragePath }} || true

      # Debug: show generated files
      - name: Debug output
        if: always()
        run: |
          echo "=== Coverage XML files ==="
          find . -name 'TestCoverageResults_*.xml' -type f || true
          echo "=== Generated .sln and .csproj files ==="
          find . -maxdepth 2 \( -name '*.sln' -o -name '*.csproj' \) -type f || true

      # Build the Unity-generated solution (required for SonarScanner .NET)
      - name: Build Solution
        if: always()
        run: |
          if ls *.sln 1>/dev/null 2>&1; then
            echo "Found .sln, attempting build..."
            dotnet build *.sln --no-incremental 2>&1 || echo "::warning::Build had errors (expected for Unity projects without local Unity DLLs)"
          else
            echo "::warning::No .sln found — SonarScanner may not analyze C# code"
          fi

      # END: Finish SonarQube analysis and upload results
      - name: SonarScanner End
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"
