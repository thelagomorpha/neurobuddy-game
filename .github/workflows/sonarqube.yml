name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  sonarqube:
    name: Build and Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-SonarQube
          restore-keys: Library-

      # Free disk space for large Unity Docker image
      - uses: jlumbroso/free-disk-space@v1.3.1

      # Run Unity tests with coverage
      - uses: game-ci/unity-test-runner@v4
        id: unity-test
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          coverageOptions: 'generateAdditionalMetrics;generateHtmlReport;generateBadgeReport;generateOpenCoverReport;assemblyFilters:+GameScripts'

      # Fix coverage file permissions (generated as root inside Docker)
      - name: Fix coverage permissions
        if: always()
        run: |
          sudo chmod -R a+r ${{ steps.unity-test.outputs.coveragePath }} || true

      # Debug: find and display coverage report
      - name: Find coverage report
        id: coverage
        run: |
          echo "=== Coverage output path ==="
          echo "${{ steps.unity-test.outputs.coveragePath }}"
          echo "=== Looking for OpenCover XML files ==="
          REPORT=$(find ${{ steps.unity-test.outputs.coveragePath }} -name '*-opencoverage.xml' -type f | head -1)
          if [ -z "$REPORT" ]; then
            echo "WARNING: No OpenCover XML found! Listing all files:"
            find ${{ steps.unity-test.outputs.coveragePath }} -type f
            REPORT=$(find . -name '*-opencoverage.xml' -type f | head -1)
          fi
          echo "Found report: $REPORT"
          echo "report=$REPORT" >> $GITHUB_OUTPUT
          if [ -n "$REPORT" ]; then
            echo "=== First 50 lines of report ==="
            head -50 "$REPORT"
          fi

      # SonarQube Scan
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.cs.opencover.reportsPaths=${{ steps.coverage.outputs.report }}
